<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="my_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>my_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #F5F7FA;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo-box {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      background-color: white;
      box-shadow: 
        -5px 5px 30px 8px rgba(74, 144, 226, 0.4),
        5px -5px 30px 8px rgba(155, 89, 182, 0.4);
      animation: pulse 2s infinite ease-in-out alternate;
      overflow: hidden;
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @keyframes pulse {
      0% {
        transform: scale(0.85);
        opacity: 0.6;
        box-shadow: 
          -5px 5px 20px 4px rgba(74, 144, 226, 0.2),
          5px -5px 20px 4px rgba(155, 89, 182, 0.2);
      }
      100% {
        transform: scale(1.05);
        opacity: 1.0;
        box-shadow: 
          -5px 5px 35px 12px rgba(74, 144, 226, 0.5),
          5px -5px 35px 12px rgba(155, 89, 182, 0.5);
      }
    }
    .loading-text {
      margin-top: 32px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #4A90E2, #9B59B6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulse 2s infinite ease-in-out alternate;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="logo-box">
      <img src="assets/assets/logo.png" alt="VL Garments Logo">
    </div>
    <div class="loading-text">LOADING WEB APP...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.style.display = 'none';
      }
    });
  </script>
</body>
</html>
