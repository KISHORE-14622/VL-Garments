services:
  # Backend API Service
  - type: web
    name: vl-garments-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # Frontend Flutter Web App
  - type: web
    name: vl-garments-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    staticPublishPath: my_app/build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
